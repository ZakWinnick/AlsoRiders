---
layout: default
---
<article class="page">
  <div class="container">
    <header class="page-head">
      {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.lede %}<p class="lede">{{ page.lede }}</p>{% endif %}
    </header>
    <div class="page-body">
      {{ content }}
    </div>
  </div>
</article>
